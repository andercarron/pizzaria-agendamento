<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login - Pizzaria</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container-auth">
        <h1> Pizzaria</h1>
        <h2>Entrar</h2>
        
        <form id="form-login">
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Sua senha" required>
            </div>
            
            <div id="erro-login" class="erro-mensagem" style="display: none;"></div>
            
            <button type="submit">Entrar</button>
        </form>
        
        <p class="link-auth">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </p>
    </div>

    <script>
        const API_URL = 'https://pizzaria-agendamento.onrender.com';
        
        document.getElementById('form-login').addEventListener('submit', async (evento) => {
            evento.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const erroDiv = document.getElementById('erro-login');

            try {
                const resposta = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Erro ao fazer login');
                }

                localStorage.setItem('token', dados.token);
                localStorage.setItem('cliente', JSON.stringify(dados.cliente));

                window.location.href = 'index.html';

            } catch (erro) {
                erroDiv.textContent = erro.message;
                erroDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
